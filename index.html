<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse Viewing — Noorie Point</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; background: #f5f5f0; color: #222; height: 100vh; display: flex; flex-direction: column; }
  #header { padding: 10px 16px; background: #fff; border-bottom: 1px solid #ddd; flex-shrink: 0; }
  #header h1 { font-size: 22px; letter-spacing: 2px; text-transform: uppercase; color: #c47b00; }
  #header p { font-size: 11px; color: #666; margin-top: 2px; letter-spacing: 1px; }
  #main { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  #map { flex: 1; min-width: 0; }
  #sidebar {
    width: calc((100vh - 233px) * 0.781); flex-shrink: 0; min-width: 60px; max-width: 55vw; position: relative;
    background: #fff; border-left: 1px solid #ddd;
    overflow-y: auto; padding: 12px 12px 12px 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  #resize-handle {
    position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
    cursor: ew-resize; background: transparent; z-index: 10;
  }
  #resize-handle:hover { background: rgba(196,123,0,0.15); }
  #resize-handle::after {
    content: ''; position: absolute; left: 2px; top: 50%; transform: translateY(-50%);
    width: 2px; height: 32px; background: #ccc; border-radius: 2px;
  }
  #resize-handle:hover::after { background: #c47b00; }
  #sidebar h3 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #c47b00; margin-bottom: 4px; }
  #sidebar img { width: 100%; display: block; border: 1px solid #eee; border-radius: 4px; }
  .leg-row { display: flex; align-items: center; gap: 8px; font-size: 11px; line-height: 1.8; }
  .leg-line { width: 28px; height: 3px; border-radius: 1px; flex-shrink: 0; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #coords { color: #c47b00; font-size: 10px; margin-top: 6px; border-top: 1px solid #eee; padding-top: 6px; }
  #time-bar { padding: 5px 16px; background: #fff; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  #time-bar-lbl { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #c47b00; white-space: nowrap; }
  #time-slider { flex: 1; accent-color: #c47b00; cursor: pointer; }
  #time-disp { font-size: 10px; color: #555; letter-spacing: 0.5px; white-space: nowrap; min-width: 140px; text-align: right; }
  #sidebar-tab { display: none; }
  #sidebar-inner { display: flex; flex-direction: column; gap: 12px; flex: 1; }
  @media (max-width: 640px) {
    #sidebar {
      position: fixed; bottom: 0; left: 0; right: 0;
      width: 100% !important; max-width: 100% !important;
      height: 72vh; padding: 0; border-left: none;
      overflow: hidden; z-index: 1000;
      transform: translateY(calc(100% - 48px));
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.18);
    }
    #sidebar.open { transform: translateY(0); }
    #sidebar-tab {
      display: flex; align-items: center; justify-content: center;
      height: 48px; flex-shrink: 0;
      background: #c47b00; color: #fff;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; user-select: none;
      border-radius: 12px 12px 0 0;
    }
    #sidebar-inner { overflow-y: auto; flex: 1; min-height: 0; padding: 12px; }
    #resize-handle { display: none; }
  }
</style>
</head>
<body>
<div id="header">
  <h1>Eclipse Viewing · 12 Aug 2026</h1>
  <p>Partial solar eclipse · 88% coverage</p>
</div>
<div id="time-bar">
  <span id="time-bar-lbl">Sun</span>
  <input type="range" id="time-slider" min="0" max="150" step="1" value="0" list="time-ticks">
  <datalist id="time-ticks">
    <option value="16"></option>
    <option value="70"></option>
    <option value="123"></option>
  </datalist>
  <span id="time-disp">19:00</span>
</div>
<div id="main">
  <div id="map"></div>
  <div id="sidebar">
    <div id="resize-handle"></div>
    <div id="sidebar-tab">▲ &nbsp; ECLIPSE INFO &nbsp; ▲</div>
    <div id="sidebar-inner">
      <div>
        <h3>Eclipse Timeline</h3>
        <img src="Eclipse_Timeline.png" alt="Eclipse timeline"/>
      </div>
      <div>
        <h3>Map Key</h3>
        <div class="leg-row"><div class="leg-dot" style="background:#e03030"></div> Viewpoint (drag)</div>
        <div class="leg-row"><div class="leg-line" style="background:#2196f3"></div> Start · 19:16 · 274°</div>
        <div class="leg-row"><div class="leg-line" style="background:#e67e00"></div> Maximum · 20:11 · 284°</div>
        <div class="leg-row"><div class="leg-line" style="background:#c0392b"></div> End · 21:03 · 294°</div>
        <div id="coords">52°23′54.1″N 4°53′28.8″E</div>
      </div>
    </div>
  </div>
</div>

<script>
let VIEW = [52.3983611, 4.8913333];
const R = 0.006;

const map = L.map('map', { center: VIEW, zoom: 15, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 19
}).addTo(map);

function azToLatLng(origin, az, r) {
  const rad = az * Math.PI / 180;
  const lat = origin[0] + r * Math.cos(rad);
  const lng = origin[1] + r * Math.sin(rad) / Math.cos(origin[0] * Math.PI / 180);
  return [lat, lng];
}

function toDMS(deg, isLat) {
  const d = Math.floor(Math.abs(deg));
  const m = Math.floor((Math.abs(deg) - d) * 60);
  const s = ((Math.abs(deg) - d) * 60 - m) * 60;
  const dir = isLat ? (deg >= 0 ? 'N' : 'S') : (deg >= 0 ? 'E' : 'W');
  return `${d}°${m}′${s.toFixed(1)}″${dir}`;
}

let rayGroup = L.layerGroup().addTo(map);
let sunLayer = L.layerGroup().addTo(map);
let sliderVal = 0;
const BASE_UTC = Date.UTC(2026, 7, 12, 17, 0, 0); // 12 Aug 2026 19:00 CEST

const phases = [
  { az: 274, color: '#2196f3', weight: 2.5, dash: '8,5', label: 'START',
    time: '19:16:05', dir: '274°', alt: '16.1°',
    event: 'Partial eclipse begins', desc: 'First contact — edge of Moon touches the Sun.' },
  { az: 284, color: '#e67e00', weight: 3.5, dash: null, label: 'MAX',
    time: '20:10:56', dir: '284°', alt: '8.1°',
    event: 'Maximum eclipse', desc: '88% of Sun covered. Clear WNW horizon essential.' },
  { az: 294, color: '#c0392b', weight: 2.5, dash: '5,5', label: 'END',
    time: '21:03:03', dir: '294°', alt: '0.7°',
    event: 'Partial eclipse ends', desc: 'Last contact. Sun nearly at horizon.' },
];

const cardinals = [
  { az: 0, label: 'N', major: true }, { az: 45, label: 'NE', major: false },
  { az: 90, label: 'E', major: true }, { az: 135, label: 'SE', major: false },
  { az: 180, label: 'S', major: true }, { az: 225, label: 'SW', major: false },
  { az: 270, label: 'W', major: true }, { az: 315, label: 'NW', major: false },
];

function drawRays(origin) {
  rayGroup.clearLayers();

  // Compass circle
  const circlePts = [];
  for (let az = 0; az <= 361; az += 2) circlePts.push(azToLatLng(origin, az, R));
  L.polyline(circlePts, { color: '#999', weight: 1.5, interactive: false }).addTo(rayGroup);

  // Ticks every 15°
  for (let az = 0; az < 360; az += 15) {
    const isMajor = az % 90 === 0;
    const is45 = az % 45 === 0;
    const tickLen = isMajor ? 0.0015 : is45 ? 0.0011 : 0.0008;
    L.polyline([azToLatLng(origin, az, R - tickLen), azToLatLng(origin, az, R)], {
      color: isMajor ? '#555' : '#aaa', weight: isMajor ? 2 : 1, interactive: false
    }).addTo(rayGroup);
    if (!isMajor) {
      L.marker(azToLatLng(origin, az, R + 0.00065), {
        icon: L.divIcon({
          className: '',
          html: `<div style="color:#777;font-size:9px;font-family:'Courier New';transform:translate(-50%,-50%);font-weight:bold;white-space:nowrap">${az}°</div>`,
          iconAnchor: [0,0]
        }), interactive: false
      }).addTo(rayGroup);
    }
  }

  // Cardinal labels
  cardinals.forEach(c => {
    L.marker(azToLatLng(origin, c.az, R + 0.002), {
      icon: L.divIcon({
        className: '',
        html: `<div style="color:${c.major?'#333':'#888'};font-size:${c.major?14:10}px;font-family:'Courier New';font-weight:bold;transform:translate(-50%,-50%)">${c.label}</div>`,
        iconAnchor: [0,0]
      }), interactive: false
    }).addTo(rayGroup);
  });

  // Sweep arc
  const sweepPts = [];
  for (let az = 274; az <= 294; az++) sweepPts.push(azToLatLng(origin, az, R));
  L.polyline(sweepPts, { color: '#e67e00', weight: 5, opacity: 0.25, interactive: false }).addTo(rayGroup);

  // Phase rays
  phases.forEach(p => {
    const end = azToLatLng(origin, p.az, R);

    const visLine = L.polyline([origin, end], {
      color: p.color, weight: p.weight, opacity: 0.85,
      dashArray: p.dash || undefined, interactive: false
    }).addTo(rayGroup);

    // Text rotation: along the ray direction, always readable (not upside down)
    let textRot = p.az - 90;
    if (p.az > 180) textRot = p.az - 270;

    L.marker(azToLatLng(origin, p.az, R * 0.6), {
      icon: L.divIcon({
        className: '',
        html: `<div style="font-family:'Courier New';font-size:10px;font-weight:bold;color:${p.color};white-space:nowrap;transform:translate(-50%,-50%) rotate(${textRot}deg);text-shadow:1px 1px 0 #fff,-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff;letter-spacing:1.5px">${p.label}</div>`,
        iconAnchor: [0,0]
      }), interactive: false
    }).addTo(rayGroup);

    // Wide hit area for hover + click
    const hitLine = L.polyline([origin, end], {
      color: '#000', weight: 22, opacity: 0.001, interactive: true
    }).addTo(rayGroup);

    hitLine.on('mouseover', () => { visLine.setStyle({ opacity: 1, weight: p.weight + 2 }); map.getContainer().style.cursor = 'pointer'; });
    hitLine.on('mouseout',  () => { visLine.setStyle({ opacity: 0.85, weight: p.weight }); map.getContainer().style.cursor = ''; });
    hitLine.on('click', e => {
      L.popup({ maxWidth: 220 }).setLatLng(e.latlng).setContent(`
        <div style="font-family:'Courier New';font-size:11px;line-height:1.8;color:#222">
          <div style="font-weight:bold;font-size:13px;color:${p.color};margin-bottom:4px">${p.label} — ${p.event}</div>
          <div>🕐 ${p.time}</div>
          <div>🧭 ${p.dir} &nbsp;&nbsp; ↗ ${p.alt}</div>
          <div style="margin-top:5px;font-size:10px;color:#555">${p.desc}</div>
        </div>`).openOn(map);
    });
  });
}

function sunPos(date, lat, lng) {
  const rad = Math.PI / 180;
  const d = date.valueOf() / 86400000 - 0.5 + 2440588 - 2451545;
  const lw = -rad * lng, phi = rad * lat;
  const M = rad * (357.5291 + 0.98560028 * d);
  const L = M + rad * (1.9148 * Math.sin(M) + 0.02 * Math.sin(2*M) + 0.0003 * Math.sin(3*M)) + rad * 102.9372 + Math.PI;
  const e = rad * 23.4397;
  const dec = Math.asin(Math.sin(L) * Math.sin(e));
  const ra = Math.atan2(Math.sin(L) * Math.cos(e), Math.cos(L));
  const H = (rad * (280.16 + 360.9856235 * d) - lw) - ra;
  return {
    az:  ((Math.atan2(Math.sin(H), Math.cos(H) * Math.sin(phi) - Math.tan(dec) * Math.cos(phi)) * 180/Math.PI) + 180 + 360) % 360,
    alt: Math.asin(Math.sin(phi) * Math.sin(dec) + Math.cos(phi) * Math.cos(dec) * Math.cos(H)) * 180/Math.PI
  };
}

function minToTimeStr(m) {
  const t = 19 * 60 + m;
  return `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
}

function updateSunRay(val) {
  sliderVal = val;
  sunLayer.clearLayers();
  const {az, alt} = sunPos(new Date(BASE_UTC + val * 60000), VIEW[0], VIEW[1]);
  const timeStr = minToTimeStr(val);
  document.getElementById('time-disp').textContent = `${timeStr} · ${az.toFixed(0)}° · ${alt.toFixed(1)}°`;
  const above = alt >= 0;
  const end = azToLatLng(VIEW, az, R);
  L.polyline([VIEW, end], {
    color: '#f0a500', weight: above ? 3 : 2,
    opacity: above ? 0.9 : 0.3, dashArray: above ? null : '5,4', interactive: false
  }).addTo(sunLayer);
  if (above) {
    let textRot = az - 90;
    if (az > 180) textRot = az - 270;
    L.marker(azToLatLng(VIEW, az, R * 0.58), {
      icon: L.divIcon({
        className: '',
        html: `<div style="font-family:'Courier New';font-size:10px;font-weight:bold;color:#c47b00;white-space:nowrap;transform:translate(-50%,-50%) rotate(${textRot}deg);text-shadow:1px 1px 0 #fff,-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff;letter-spacing:1.5px">${timeStr}</div>`,
        iconAnchor: [0,0]
      }), interactive: false
    }).addTo(sunLayer);
  }
}

// Draggable viewpoint marker
const marker = L.marker(VIEW, {
  draggable: true,
  icon: L.divIcon({
    className: '',
    html: `<div style="width:16px;height:16px;border-radius:50%;background:#e03030;border:2px solid #fff;box-shadow:0 0 8px rgba(224,48,48,0.5);cursor:grab"></div>`,
    iconAnchor: [8, 8]
  })
}).addTo(map);

drawRays(VIEW);

marker.on('drag', e => {
  const ll = e.target.getLatLng();
  VIEW = [ll.lat, ll.lng];
  drawRays(VIEW);
  updateSunRay(sliderVal);
  document.getElementById('coords').textContent = `${toDMS(ll.lat, true)} ${toDMS(ll.lng, false)}`;
});
marker.on('dragend', e => {
  const ll = e.target.getLatLng();
  VIEW = [ll.lat, ll.lng];
  drawRays(VIEW);
  updateSunRay(sliderVal);
});

// Resizable sidebar
const sidebar = document.getElementById('sidebar');
const handle  = document.getElementById('resize-handle');
let dragging = false, startX, startW;

handle.addEventListener('mousedown', e => {
  dragging = true; startX = e.clientX; startW = sidebar.offsetWidth;
  document.body.style.cursor = 'ew-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const newW = Math.max(60, Math.min(window.innerWidth * 0.85, startW + (startX - e.clientX)));
  sidebar.style.width = newW + 'px';
  map.invalidateSize();
});
window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  map.invalidateSize();
});
handle.addEventListener('touchstart', e => {
  dragging = true; startX = e.touches[0].clientX; startW = sidebar.offsetWidth;
  e.preventDefault();
}, { passive: false });
window.addEventListener('touchmove', e => {
  if (!dragging) return;
  const newW = Math.max(60, Math.min(window.innerWidth * 0.85, startW + (startX - e.touches[0].clientX)));
  sidebar.style.width = newW + 'px';
  map.invalidateSize();
}, { passive: false });
window.addEventListener('touchend', () => { dragging = false; map.invalidateSize(); });

// Mobile sidebar toggle
const sidebarTab = document.getElementById('sidebar-tab');
sidebarTab.addEventListener('click', () => {
  const open = sidebar.classList.toggle('open');
  sidebarTab.textContent = open ? '▼  ECLIPSE INFO  ▼' : '▲  ECLIPSE INFO  ▲';
  map.invalidateSize();
});

// Time slider — set max to ~20 min past sunset, then init
const timeSlider = document.getElementById('time-slider');
let sunsetMin = 150;
for (let m = 100; m <= 180; m++) {
  if (sunPos(new Date(BASE_UTC + m * 60000), VIEW[0], VIEW[1]).alt < 0) { sunsetMin = m + 20; break; }
}
timeSlider.max = sunsetMin;
timeSlider.addEventListener('input', e => updateSunRay(+e.target.value));
updateSunRay(0);
</script>
</body>
</html>
